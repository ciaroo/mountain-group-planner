<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
</head>
<body>
    <h1>Accedi</h1>

    {% if form.errors %}
        <p>Username o password non corretti. Riprova.</p>
    {% endif %}

    <form method="post">
        {% csrf_token %}

        <p>
            <label for="id_username">Username:</label><br>
            {{ form.username }}
        </p>

        <p>
            <label for="id_password">Password:</label><br>
            {{ form.password }}
        </p>

        <button type="submit">Accedi</button>
    </form>

    <p>
        <a href="{% url 'activities:activity_list' %}">Torna alle attività</a>
    </p>
</body>
</html>
